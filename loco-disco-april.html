<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loco Pub Disco Night</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            padding: 20px;
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
        }

        .disco-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, #ff0080 0%, transparent 50%),
                radial-gradient(circle at 80% 30%, #00ff80 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, #8000ff 0%, transparent 50%),
                radial-gradient(circle at 60% 20%, #ff8000 0%, transparent 50%),
                radial-gradient(circle at 30% 30%, #0080ff 0%, transparent 50%);
            animation: disco-lights 2s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes disco-lights {
            0% {
                filter: hue-rotate(0deg) brightness(0.8);
                transform: scale(1);
            }
            100% {
                filter: hue-rotate(180deg) brightness(1.2);
                transform: scale(1.1);
            }
        }

        .poster {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
            border-radius: 20px;
            box-shadow: 
                0 0 50px rgba(255,0,255,0.5),
                0 0 100px rgba(0,255,255,0.3),
                inset 0 0 60px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            border: 4px solid #ffd700;
        }

        .poster::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 10px,
                    rgba(255,255,255,0.03) 10px,
                    rgba(255,255,255,0.03) 20px
                );
            animation: scan 10s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translate(0,0); }
            100% { transform: translate(20px, 20px); }
        }

        .header {
            background: linear-gradient(180deg, #ff0080 0%, #ff00ff 100%);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 100%, 0 90%);
            z-index: 1;
        }

        .disco-ball {
            font-size: 60px;
            animation: spin-bounce 2s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));
        }

        @keyframes spin-bounce {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
        }

        .pub-title {
            font-family: 'Bangers', cursive;
            font-size: 52px;
            color: #fff;
            text-shadow: 
                4px 4px 0 #ff0080,
                8px 8px 0 #000;
            letter-spacing: 3px;
            margin-top: 10px;
            transform: rotate(-2deg);
            animation: wobble 0.5s ease-in-out infinite alternate;
        }

        @keyframes wobble {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }

        .content {
            padding: 30px;
            position: relative;
            z-index: 1;
        }

        .event-type {
            font-family: 'Bangers', cursive;
            font-size: 48px;
            text-align: center;
            color: #ffd700;
            text-shadow: 
                3px 3px 0 #ff0080,
                -2px -2px 0 #00ff80;
            animation: glow 1s ease-in-out infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes glow {
            0% { text-shadow: 3px 3px 0 #ff0080, -2px -2px 0 #00ff80, 0 0 20px rgba(255,215,0,0.5); }
            100% { text-shadow: 3px 3px 0 #ff0080, -2px -2px 0 #00ff80, 0 0 40px rgba(255,215,0,1); }
        }

        .date-block {
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.3);
            transform: rotate(1deg);
        }

        .date-number {
            font-family: 'Bangers', cursive;
            font-size: 72px;
            color: #fff;
            text-shadow: 4px 4px 0 #000;
            line-height: 1;
        }

        .date-month {
            font-size: 32px;
            color: #1a0033;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .location {
            background: rgba(255,255,255,0.1);
            border: 3px dashed #ffd700;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .location-icon {
            font-size: 40px;
            margin-bottom: 10px;
            animation: bounce-location 1s ease infinite;
            display: inline-block;
        }

        @keyframes bounce-location {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .address {
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }

        .road {
            font-family: 'Permanent Marker', cursive;
            font-size: 32px;
            color: #ff0080;
            transform: rotate(-3deg);
            display: inline-block;
            margin-top: 5px;
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .feature-item {
            background: linear-gradient(135deg, #ff00ff, #ff0080);
            border-radius: 50px;
            padding: 15px 25px;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            animation: feature-pulse 2s ease infinite;
        }

        .feature-item:nth-child(2) { animation-delay: 0.5s; background: linear-gradient(135deg, #00ff80, #0080ff); }
        .feature-item:nth-child(3) { animation-delay: 1s; background: linear-gradient(135deg, #ffd700, #ff8000); }

        @keyframes feature-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .time-block {
            background: #000;
            border: 3px solid #00ff80;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .time-label {
            font-size: 20px;
            color: #00ff80;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .time-value {
            font-family: 'Bangers', cursive;
            font-size: 42px;
            color: #fff;
            text-shadow: 0 0 20px #00ff80;
        }

        .footer {
            background: linear-gradient(180deg, #ff0080, #ff00ff);
            padding: 30px;
            text-align: center;
        }

        .cta {
            display: inline-block;
            background: #ffd700;
            color: #1a0033;
            font-family: 'Bangers', cursive;
            font-size: 28px;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 
                0 8px 0 #b8860b,
                0 15px 30px rgba(0,0,0,0.4);
            transform: translateY(0);
            transition: all 0.2s;
            animation: cta-shake 3s ease infinite;
        }

        @keyframes cta-shake {
            0%, 90%, 100% { transform: rotate(0deg); }
            92% { transform: rotate(-5deg); }
            94% { transform: rotate(5deg); }
            96% { transform: rotate(-5deg); }
            98% { transform: rotate(5deg); }
        }

        .cta:active {
            transform: translateY(8px);
            box-shadow: 
                0 0 0 #b8860b,
                0 5px 15px rgba(0,0,0,0.4);
        }

        .contact-info {
            margin-top: 20px;
            color: #fff;
            font-size: 18px;
        }

        .music-notes {
            position: absolute;
            font-size: 30px;
            animation: float-note 3s ease-in-out infinite;
            opacity: 0.6;
        }

        .music-notes:nth-child(1) { top: 20%; left: 5%; animation-delay: 0s; }
        .music-notes:nth-child(2) { top: 40%; right: 5%; animation-delay: 1s; }
        .music-notes:nth-child(3) { bottom: 30%; left: 8%; animation-delay: 2s; }

        @keyframes float-note {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 1; }
        }

        @media (max-width: 480px) {
            .pub-title { font-size: 40px; }
            .event-type { font-size: 38px; }
            .date-number { font-size: 56px; }
            .road { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="disco-bg"></div>
    
    <div class="poster">
        <div class="music-notes">🎵</div>
        <div class="music-notes">🎶</div>
        <div class="music-notes">🎵</div>

        <div class="header">
            <div class="disco-ball">🪩</div>
            <div class="pub-title">THE LOCO PUB 🍻</div>
        </div>

        <div class="content">
            <div class="event-type">🕺 DISCO NIGHT 💃</div>

            <div class="date-block">
                <div class="date-number">30</div>
                <div class="date-month">April</div>
            </div>

            <div class="location">
                <div class="location-icon">📍</div><br>
                <div class="address">Beaver Road</div>
                <div class="road">Ashford, Kent</div>
            </div>

            <div class="features">
                <div class="feature-item">🎧 DJ & Music</div>
                <div class="feature-item">💃 Dance Floor</div>
                <div class="feature-item">🍺 Drinks Deals</div>
            </div>

            <div class="time-block">
                <div class="time-label">Doors Open</div>
                <div class="time-value">8:00 PM</div>
            </div>
        </div>

        <div class="footer">
            <a href="#" class="cta">🎫 GET YOUR TICKETS! 🎫</a>
            <div class="contact-info">
                Don't Miss Out! 🎉<br>
                <strong>📞 01234 567890</strong>
            </div>
        </div>
    </div>
</body>
</html>
