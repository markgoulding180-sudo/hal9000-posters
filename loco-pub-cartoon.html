<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Loco Pub - Cartoon Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&family=Chewy&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: 
                radial-gradient(circle at 20% 50%, #ff6b35 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, #ffd93d 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, #6bcf7f 0%, transparent 50%),
                linear-gradient(135deg, #ff6b35 0%, #f7c53b 50%, #6bcf7f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Comic Neue', cursive;
        }

        .poster {
            width: 100%;
            max-width: 450px;
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.4),
                0 0 0 8px #000,
                0 0 0 12px #ff6b35;
            position: relative;
            transform: rotate(-2deg);
            transition: transform 0.3s;
        }

        .poster:hover {
            transform: rotate(0deg) scale(1.02);
        }

        .poster::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: 
                repeating-linear-gradient(
                    45deg,
                    #000 0px,
                    #000 2px,
                    transparent 2px,
                    transparent 8px
                );
            z-index: -1;
            border-radius: 30px;
        }

        .photo-section {
            position: relative;
            height: 320px;
            overflow: hidden;
            border-bottom: 6px solid #000;
        }

        .pub-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: 
                contrast(1.4) 
                saturate(1.5) 
                brightness(1.1)
                drop-shadow(0 0 0 #000);
            transition: all 0.3s;
        }

        .comic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.03) 2px,
                    rgba(0,0,0,0.03) 4px
                );
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        .burst-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 100px;
            height: 100px;
            background: #ff3333;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: rotate(15deg);
            box-shadow: 
                4px 4px 0 #000,
                inset -10px -10px 0 rgba(0,0,0,0.2);
            z-index: 10;
            animation: burst-pulse 0.6s ease infinite alternate;
        }

        @keyframes burst-pulse {
            0% { transform: rotate(15deg) scale(1); }
            100% { transform: rotate(15deg) scale(1.1); }
        }

        .burst-text {
            font-family: 'Bangers', cursive;
            font-size: 14px;
            color: #fff;
            text-align: center;
            line-height: 1.2;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 1px;
        }

        .title-section {
            background: linear-gradient(180deg, #ff6b35 0%, #ff8c42 100%);
            padding: 25px 20px;
            text-align: center;
            position: relative;
            border-bottom: 4px dashed #000;
        }

        .title-section::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid #ff8c42;
        }

        .the-loco {
            font-family: 'Bangers', cursive;
            font-size: 52px;
            color: #fff;
            text-shadow: 
                5px 5px 0 #000,
                -2px -2px 0 #ffd93d;
            letter-spacing: 4px;
            transform: rotate(-3deg);
            display: inline-block;
            animation: title-bounce 1s ease infinite alternate;
        }

        @keyframes title-bounce {
            0% { transform: rotate(-3deg) translateY(0); }
            100% { transform: rotate(-3deg) translateY(-5px); }
        }

        .pub-badge {
            display: inline-block;
            background: #000;
            color: #ffd93d;
            font-family: 'Chewy', cursive;
            font-size: 20px;
            padding: 8px 25px;
            border-radius: 30px;
            margin-top: 10px;
            letter-spacing: 3px;
            box-shadow: 0 4px 0 #666;
        }

        .content-section {
            background: linear-gradient(180deg, #fff9e6 0%, #fff 100%);
            padding: 30px 20px;
            position: relative;
        }

        .content-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: repeating-linear-gradient(
                90deg,
                #ff6b35 0px,
                #ff6b35 20px,
                #ffd93d 20px,
                #ffd93d 40px,
                #6bcf7f 40px,
                #6bcf7f 60px
            );
        }

        .location-box {
            background: #000;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 8px 0 #333;
        }

        .location-box::before {
            content: '📍';
            font-size: 30px;
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd93d;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #000;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .road-text {
            font-family: 'Bangers', cursive;
            font-size: 32px;
            color: #ffd93d;
            margin-top: 15px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .town-text {
            font-size: 18px;
            color: #fff;
            margin-top: 5px;
            font-weight: bold;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .feature-card {
            background: linear-gradient(135deg, #6bcf7f 0%, #4ecdc4 100%);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 3px solid #000;
            box-shadow: 
                4px 4px 0 rgba(0,0,0,0.2),
                inset 0 -5px 0 rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .feature-card:hover {
            transform: translateY(-3px);
            box-shadow: 
                6px 6px 0 rgba(0,0,0,0.2),
                inset 0 -5px 0 rgba(0,0,0,0.1);
        }

        .feature-card:nth-child(2) {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        }

        .feature-card:nth-child(3) {
            background: linear-gradient(135deg, #ffd93d 0%, #ff6b35 100%);
        }

        .feature-card:nth-child(4) {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .feature-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3));
        }

        .feature-text {
            font-family: 'Bangers', cursive;
            font-size: 16px;
            color: #000;
            letter-spacing: 1px;
        }

        .hours-section {
            background: linear-gradient(135deg, #2d3436 0%, #000 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
            border: 4px solid #ffd93d;
            position: relative;
        }

        .hours-title {
            font-family: 'Bangers', cursive;
            font-size: 28px;
            color: #ff6b35;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 2px;
        }

        .hours-text {
            color: #fff;
            font-size: 18px;
            line-height: 1.8;
        }

        .hours-text .day {
            color: #ffd93d;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        .highlight-time {
            color: #6bcf7f;
            font-size: 22px;
            font-family: 'Bangers', cursive;
        }

        .footer {
            background: #ff3333;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: 
                radial-gradient(circle at 50% 0, transparent 10px, #ff3333 10px);
            background-size: 20px 20px;
        }

        .cta-btn {
            display: inline-block;
            background: #ffd93d;
            color: #000;
            font-family: 'Bangers', cursive;
            font-size: 26px;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            border: 4px solid #000;
            box-shadow: 
                0 8px 0 #000,
                0 15px 30px rgba(0,0,0,0.4);
            transform: translateY(0);
            transition: all 0.1s;
            letter-spacing: 2px;
            animation: btn-shake 2s ease infinite;
        }

        @keyframes btn-shake {
            0%, 90%, 100% { transform: rotate(0deg); }
            92% { transform: rotate(-3deg); }
            94% { transform: rotate(3deg); }
            96% { transform: rotate(-3deg); }
            98% { transform: rotate(3deg); }
        }

        .cta-btn:active {
            transform: translateY(8px);
            box-shadow: 
                0 0 0 #000,
                0 5px 15px rgba(0,0,0,0.4);
        }

        .phone-number {
            margin-top: 20px;
            font-family: 'Bangers', cursive;
            font-size: 28px;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            letter-spacing: 2px;
        }

        .established {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        @media (max-width: 480px) {
            .poster { max-width: 100%; }
            .the-loco { font-size: 42px; }
            .burst-badge { width: 80px; height: 80px; }
            .burst-text { font-size: 12px; }
            .road-text { font-size: 26px; }
            .photo-section { height: 280px; }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="photo-section">
            <div class="burst-badge">
                <div class="burst-text">YOUR<br>LOCAL</div>
            </div>
            <img src="loco-pub-interior.jpg" alt="The Loco Pub - Cartoon Style" class="pub-photo">
            <div class="comic-overlay"></div>
        </div>

        <div class="title-section">
            <div class="the-loco">THE LOCO</div>
            <div class="pub-badge">🍺 PUB 🍺</div>
        </div>

        <div class="content-section">
            <div class="location-box">
                <div class="road-text">Beaver Road</div>
                <div class="town-text">Ashford, Kent</div>
            </div>

            <div class="features-grid">
                <div class="feature-card">
                    <span class="feature-icon">🍺</span>
                    <span class="feature-text">COLD BEER</span>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">📺</span>
                    <span class="feature-text">LIVE SPORT</span>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">🎵</span>
                    <span class="feature-text">GREAT TUNES</span>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">🎯</span>
                    <span class="feature-text">PLAY DARTS</span>
                </div>
            </div>

            <div class="hours-section">
                <div class="hours-title">⏰ OPENING HOURS ⏰</div>
                <div class="hours-text">
                    <span class="day">Mon - Thu:</span> 12:00 - 23:00<br>
                    <span class="day">Fri - Sat:</span> <span class="highlight-time">12:00 - LATE!</span><br>
                    <span class="day">Sunday:</span> 12:00 - 22:30
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="tel:01234567890" class="cta-btn">📞 CALL NOW!</a>
            <div class="phone-number">01234 567890</div>
        </div>
    </div>
</body>
</html>
